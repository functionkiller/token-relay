<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Relay - Login</title>
    <style>
        :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3345; --text: #e4e6ed; --text2: #9095a8; --accent: #6c8cff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: "PingFang SC", system-ui, sans-serif; }
        .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 400px; }
        h1 { font-size: 20px; margin-bottom: 24px; text-align: center; color: var(--accent); }
        label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 16px; }
        button { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .error { color: #f87171; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Token Relay Admin</h1>
        <div class="error" id="error" style="display:none"></div>
        <label>邮箱</label>
        <input type="email" id="email" placeholder="admin@tokenrelay.com">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
        <button onclick="login()">登录</button>
    </div>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                if (!res.ok) throw new Error('Invalid credentials');
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                window.location.href = '/admin';
            } catch (e) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = e.message;
            }
        }
    </script>
</body>
</html>
