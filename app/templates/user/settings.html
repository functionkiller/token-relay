<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Token Relay</title>
    <link rel="stylesheet" href="/static/user.css">
</head>
<body>
{% include "user/_nav.html" %}
<main style="max-width:600px;">
    <h1>Settings</h1>
    <p class="subtitle">Manage your account</p>
    <div class="card">
        <h3>Profile</h3>
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
        <button onclick="updateEmail()" style="margin-bottom:20px;">Update Email</button>
    </div>
    <div class="card">
        <h3>Change Password</h3>
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Min 8 characters">
        <button onclick="changePassword()">Change Password</button>
    </div>
</main>
<script src="/static/user.js"></script>
<script>
loadSettings();
</script>
</body>
</html>
