{% extends "user/_layout.html" %}{% block title %}Settings — Token Relay{% endblock %}
{% block content %}
<div class="page-header"><h1>Settings</h1><p class="desc">Manage your account</p></div>
<div class="section"><div class="card"><div class="card-header"><h3>Profile</h3></div>
<div id="profile-info" style="margin-bottom:var(--space-6)"><p style="color:var(--text-tertiary)">Loading...</p></div>
<div class="form-group"><label>Update Email</label><div style="display:flex;gap:var(--space-2)"><input type="email" id="email" placeholder="you@example.com" style="flex:1;margin-bottom:0"><button class="btn btn-primary" onclick="updateEmail()">Update</button></div></div>
</div></div>
<div class="section"><div class="card"><div class="card-header"><h3>Change Password</h3></div>
<div class="form-group"><label>New Password</label><div style="display:flex;gap:var(--space-2)"><input type="password" id="new-password" placeholder="At least 8 characters" style="flex:1;margin-bottom:0" onkeydown="if(event.key==='Enter')changePassword()"><button class="btn btn-primary" onclick="changePassword()">Change</button></div></div>
</div></div>
{% endblock %}{% block scripts %}<script>loadSettings();</script>{% endblock %}
