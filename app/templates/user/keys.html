<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Keys - Token Relay</title>
    <link rel="stylesheet" href="/static/user.css">
</head>
<body>
{% include "user/_nav.html" %}
<main>
    <h1>API Keys</h1>
    <p class="subtitle">Manage keys for different applications. Keys are shown only once at creation.</p>
    <div class="card">
        <div class="inline-form">
            <input type="text" id="key-name" placeholder="Key name (e.g. production-app)" maxlength="40">
            <button onclick="createKey()">Create Key</button>
        </div>
        <div id="new-key" class="highlight" style="display:none;">
            <p style="font-size:12px;color:var(--muted);margin-bottom:4px;">Copy this key now. It will not be shown again.</p>
            <div class="key-display">
                <code id="full-key-display"></code>
                <button class="sm" onclick="copyKey()">Copy</button>
            </div>
        </div>
        <div id="keys-list"></div>
    </div>
</main>
<script src="/static/user.js"></script>
<script>
loadKeys();
</script>
</body>
</html>
