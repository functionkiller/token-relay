<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Token Relay</title>
<link rel="stylesheet" href="/static/base.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:var(--space-10);width:420px}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.auth-logo h1{font-size:22px;color:var(--text)}
.auth-sub{text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8);font-size:14px}
.auth-error{background:var(--danger-subtle);color:var(--danger);padding:var(--space-3) var(--space-4);border-radius:var(--radius);font-size:13px;margin-bottom:var(--space-4);display:none}
.auth-footer{text-align:center;margin-top:var(--space-6);font-size:13px;color:var(--text-secondary)}
.btn-full{width:100%}
</style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="var(--accent)" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="var(--accent)"/></svg>
        <h1>Token Relay</h1>
    </div>
    <p class="auth-sub">Your gateway to Chinese LLMs</p>
    {% if error %}<div class="auth-error" style="display:block">{{ error }}</div>{% endif %}
    <form method="post" action="/api/auth/login-form">
        <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@example.com" required autocomplete="email"></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Enter password" required autocomplete="current-password"></div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <div class="auth-footer">Don&rsquo;t have an account? <a href="/register">Create one</a></div>
</div>
</body>
</html>
