<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Token Relay</title>
    <link rel="stylesheet" href="/static/base.css">
    <style>
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f8f8f7 0%, #f0fdfa 50%, #f8f8f7 100%);
        }
        .auth-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: var(--space-10);
            width: 420px; box-shadow: var(--shadow-lg);
        }
        .auth-logo {
            display: flex; align-items: center; justify-content: center; gap: var(--space-2);
            margin-bottom: var(--space-2);
        }
        .auth-logo .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 12px rgba(13,148,136,.4);
        }
        .auth-logo h1 { font-size: 22px; }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: var(--space-8); font-size: 14px; }
        .auth-error { background: var(--danger-subtle); color: var(--danger); padding: var(--space-3) var(--space-4); border-radius: var(--radius); font-size: 13px; margin-bottom: var(--space-4); display: none; }
        .auth-footer { text-align: center; margin-top: var(--space-6); font-size: 13px; color: var(--text-secondary); }
        .auth-footer a { font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <span class="dot"></span>
            <h1>Token Relay</h1>
        </div>
        <p class="auth-subtitle">Your gateway to Chinese LLMs</p>

        <div class="auth-error" id="error"></div>

        {% if error %}
        <div class="auth-error" style="display:block;">{{ error }}</div>
        {% endif %}

        <form method="post" action="/api/auth/login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
</body>
</html>
