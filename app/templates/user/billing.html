{% extends "user/_layout.html" %}
{% block title %}Billing - Token Relay{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Billing</h1>
    <p class="desc">Transaction history and credit balance</p>
</div>

<div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
    <div class="stat-card">
        <div class="stat-value" id="balance">--</div>
        <div class="stat-label">Current Balance</div>
    </div>
</div>

<div class="section">
    <div class="card">
        <div class="toolbar">
            <select id="txn-type" style="min-width:140px;">
                <option value="">All Types</option>
                <option value="purchase">Purchase</option>
                <option value="consumption">Consumption</option>
                <option value="refund">Refund</option>
                <option value="admin_adjust">Adjustment</option>
            </select>
            <button class="btn btn-secondary btn-sm" onclick="loadBilling(1)">Apply</button>
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('txn-type').value='';loadBilling(1);">Clear</button>
        </div>
        <table>
            <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Balance After</th><th>Note</th></tr></thead>
            <tbody id="txn-table"><tr><td colspan="5"><div class="empty-state"><p>Loading...</p></div></td></tr></tbody>
        </table>
        <div class="pagination" id="pager"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>loadBilling();</script>
{% endblock %}
