<!DOCTYPE html>
<html lang="zh-CN" class="theme-dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Token Relay</title>
    <link rel="stylesheet" href="/static/base.css">
    <style>
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: var(--bg);
        }
        .auth-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: var(--space-10);
            width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .auth-logo {
            display: flex; align-items: center; justify-content: center; gap: var(--space-2);
            margin-bottom: var(--space-2);
        }
        .auth-logo .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 12px rgba(245,158,11,.4);
        }
        .auth-logo h1 { font-size: 20px; color: var(--text); }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: var(--space-8); font-size: 13px; }
        .auth-error { background: var(--danger-subtle); color: var(--danger); padding: var(--space-3) var(--space-4); border-radius: var(--radius); font-size: 13px; margin-bottom: var(--space-4); display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <span class="dot"></span>
            <h1>Token Relay</h1>
        </div>
        <p class="auth-subtitle">Admin Console</p>
        <div class="auth-error" id="error"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin@tokenrelay.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button class="btn btn-primary" id="login-btn" style="width:100%;" onclick="login()">Sign In</button>
    </div>
    <script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const error = document.getElementById('error');
        if (!email || !password) { error.textContent = 'Please enter email and password'; error.style.display = 'block'; return; }
        btn.disabled = true; btn.textContent = 'Signing in...'; error.style.display = 'none';
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Invalid credentials'); }
            const data = await res.json();
            localStorage.setItem('token', data.access_token);
            window.location.href = '/admin';
        } catch(e) {
            error.textContent = e.message; error.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    }
    </script>
</body>
</html>
