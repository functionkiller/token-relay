{% extends "admin/_layout.html" %}{% block title %}Users — Token Relay{% endblock %}
{% block content %}
<div class="admin-header"><h2>Users</h2></div>
<div class="toolbar"><input type="text" id="search" placeholder="Search by email..." oninput="searchUsers()"><select id="status-filter" onchange="searchUsers()"><option value="">All Status</option><option value="true">Active</option><option value="false">Disabled</option></select></div>
<div class="card"><table><thead><tr><th>Email</th><th>Role</th><th>Balance</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
<tbody id="users-table"><tr><td colspan="6"><div class="empty-state"><p>Loading...</p></div></td></tr></tbody></table><div class="pagination" id="users-pager"></div></div>

<div class="modal-overlay" id="credit-modal"><div class="modal"><h3>Adjust Credits</h3>
<input type="hidden" id="credit-user-id"><p class="text-secondary text-sm" id="credit-user-email" style="margin-bottom:var(--space-5)"></p>
<div class="form-group"><label>Amount (cents, positive to add)</label><input type="number" id="credit-amount" placeholder="e.g. 10000 = $100.00" class="text-mono"></div>
<div class="form-group"><label>Note</label><input type="text" id="credit-note" placeholder="Reason for adjustment"></div>
<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('credit-modal')">Cancel</button><button class="btn btn-primary" onclick="submitCredit()">Confirm</button></div></div></div>

<div class="modal-overlay" id="edit-modal"><div class="modal"><h3>Edit User</h3>
<input type="hidden" id="edit-user-id"><p class="text-secondary text-sm" id="edit-user-email" style="margin-bottom:var(--space-5)"></p>
<div class="form-group"><label>Role</label><select id="edit-role"><option value="user">User</option><option value="admin">Admin</option></select></div>
<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('edit-modal')">Cancel</button><button class="btn btn-primary" onclick="submitEdit()">Save</button></div></div></div>
{% endblock %}{% block scripts %}
<script>
let userPage=1;async function searchUsers(p=1){userPage=p;const params=new URLSearchParams({page:p,size:15}),s=document.getElementById('search').value,a=document.getElementById('status-filter').value;if(s)params.set('search',s);if(a)params.set('is_active',a);try{const d=await api('/api/admin/users?'+params),tb=document.getElementById('users-table');if(d.items.length===0){tb.innerHTML='<tr><td colspan="6"><div class="empty-state"><p>No users found</p></div></td></tr>';document.getElementById('users-pager').innerHTML='';return}tb.innerHTML=d.items.map(u=>'<tr><td>'+u.email+'</td><td><span class="badge '+(u.role==='admin'?'badge-warning':'badge-neutral')+'">'+u.role+'</span></td><td class="text-mono">$'+formatCredits(u.credit_balance)+'</td><td><label class="toggle"><input type="checkbox" '+(u.is_active?'checked':'')+' onchange="toggleUser(\''+u.id+'\',this.checked)"><span class="toggle-track"></span></label><span class="badge '+(u.is_active?'badge-success':'badge-danger')+'" style="margin-left:6px">'+(u.is_active?'active':'disabled')+'</span></td><td class="text-sm">'+fmtDateShort(u.created_at)+'</td><td><button class="btn btn-xs btn-ghost" onclick="openModal(\'credit-modal\');document.getElementById(\'credit-user-id\').value=\''+u.id+'\';document.getElementById(\'credit-user-email\').textContent=\''+u.email+' | Current: $\'+formatCredits('+u.credit_balance+')">Credits</button> <button class="btn btn-xs btn-ghost" onclick="openModal(\'edit-modal\');document.getElementById(\'edit-user-id\').value=\''+u.id+'\';document.getElementById(\'edit-user-email\').textContent=\''+u.email+'\';document.getElementById(\'edit-role\').value=\''+u.role+'\'">Edit</button></td></tr>').join('');renderPager('users-pager',d.page,d.pages,'searchUsers')}catch(e){toast(e.message,false)}}async function toggleUser(id,active){try{await api('/api/admin/users/'+id,{method:'PATCH',body:{is_active:active}});toast(active?'User activated':'User disabled')}catch(e){toast(e.message,false);searchUsers(userPage)}}async function submitCredit(){const id=document.getElementById('credit-user-id').value,amt=parseInt(document.getElementById('credit-amount').value),note=document.getElementById('credit-note').value||'Admin adjustment';if(isNaN(amt)||amt===0){toast('Enter valid amount',false);return}try{await api('/api/admin/users/'+id+'/credits',{method:'POST',body:{amount:amt,note}});closeModal('credit-modal');toast('Credits adjusted');searchUsers(userPage)}catch(e){toast(e.message,false)}}async function submitEdit(){const id=document.getElementById('edit-user-id').value,role=document.getElementById('edit-role').value;try{await api('/api/admin/users/'+id,{method:'PATCH',body:{role}});closeModal('edit-modal');toast('User updated');searchUsers(userPage)}catch(e){toast(e.message,false)}}searchUsers()
</script>{% endblock %}
